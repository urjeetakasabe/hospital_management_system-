<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - HMS</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css' rel='stylesheet'/>
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        /* nicer event look */
        .fc-event {
            border: none !important;
            padding: 4px 6px !important;
            border-radius: 8px !important;
            font-size: 12px !important;
            font-weight: 600 !important;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .fc-event:hover {
            transform: scale(1.03);
            transition: 0.2s;
        }

        .fc-daygrid-event-dot {
            display: none !important; /* remove ugly blue dot */
        }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 min-h-screen">

<nav class="bg-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <h1 class="text-xl font-bold text-indigo-700">My Appointments</h1>

            <div class="flex gap-3 items-center">
                <a href="/appointment/book"
                   class="bg-indigo-600 text-white px-4 py-2 rounded-full">
                    New Appointment
                </a>

                <form th:action="@{/logout}" method="post">
                    <button class="text-red-600">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="max-w-7xl mx-auto p-6">

    <div class="bg-white rounded-2xl shadow-xl p-4">
        <div id="calendar"></div>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const calendarEl = document.getElementById('calendar');

    const calendar = new FullCalendar.Calendar(calendarEl, {

        initialView: 'dayGridMonth',

        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,listWeek'
        },

        height: 'auto',

        events: function (fetchInfo, successCallback, failureCallback) {

            fetch('/appointment/events')
                .then(res => res.json())
                .then(data => {

                    const events = data.map(a => ({
                        id: a.id,
                        title: a.title,   // 👈 full text visible
                        start: a.startTime,
                        end: a.endTime,

                        // better color logic
                        backgroundColor: a.status === 'SCHEDULED' ? '#4f46e5' :
                                         a.status === 'COMPLETED' ? '#16a34a' : '#dc2626',

                        borderColor: 'transparent'
                    }));

                    successCallback(events);
                })
                .catch(err => failureCallback(err));
        },

        // ✅ clean tooltip (important improvement)
        eventDidMount: function(info) {

            const status = info.event.extendedProps.status || '';

            info.el.setAttribute(
                'title',
                `${info.event.title} \nStatus: ${status}`
            );
        }

    });

    calendar.render();
});
</script>

</body>
</html>
